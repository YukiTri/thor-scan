<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>T.H.O.R. Hülsen-Scan</title>
<style>
  :root{
    --bg:#0f1115; --card:#1a1e26; --line:#2a3038; --txt:#e8ecf1;
    --muted:#8b95a3; --accent:#3b82f6; --ok:#22c55e; --warn:#f59e0b; --err:#ef4444;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
       background:var(--bg);color:var(--txt);-webkit-text-size-adjust:100%}
  header{padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;
         background:var(--bg);z-index:5}
  h1{font-size:16px;margin:0 0 10px}
  .stations{display:flex;gap:6px}
  .stations button{flex:1;padding:12px 4px;border:1px solid var(--line);background:var(--card);
       color:var(--muted);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
  .stations button.active{color:#fff;border-color:var(--accent);background:#1e293b}
  .stations button[data-s="extrudieren"].active{border-color:var(--accent)}
  .stations button[data-s="wiegen"].active{border-color:var(--accent)}
  .stations button[data-s="einbau"].active{border-color:var(--accent)}
  main{padding:16px;max-width:560px;margin:0 auto}
  .scanbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
  input[type=text],input[type=number]{width:100%;padding:14px;font-size:18px;border-radius:10px;
       border:1px solid var(--line);background:#0c0e12;color:var(--txt);outline:none}
  input:focus{border-color:var(--accent)}
  .row{display:flex;gap:10px;align-items:flex-end;margin-top:12px}
  .row>div{flex:1}
  .btn{padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;width:100%}
  .btn-ausschuss{background:#3a2226;color:#ffb4b4;border:1px solid #5a2a30;margin-top:10px}
  .result{border-radius:14px;padding:16px;margin-bottom:14px;font-size:15px;line-height:1.5;display:none}
  .result.show{display:block}
  .result.ok{background:#0f2417;border:1px solid #1f5132}
  .result.warn{background:#2a210d;border:1px solid #5a4410}
  .result.err{background:#2a1416;border:1px solid #5a2025}
  .result .big{font-size:24px;font-weight:800;margin:4px 0}
  .result .serie{font-size:28px;font-weight:800;color:var(--ok);letter-spacing:.02em}
  .blockinfo{font-size:13px;color:var(--muted);text-align:center;margin-top:4px}
  .log{margin-top:8px}
  .log h2{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:18px 0 8px}
  .logrow{display:flex;justify-content:space-between;gap:8px;padding:8px 10px;border:1px solid var(--line);
       border-radius:8px;margin-bottom:6px;font-size:13px;background:var(--card)}
  .logrow .code{font-weight:700}
  .logrow .st{color:var(--muted)}
  .muted{color:var(--muted)}
  .pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:12px;font-weight:700}
  .pill.extrudiert{background:#13294a;color:#93c5fd}
  .pill.gewogen{background:#13294a;color:#93c5fd}
  .pill.eingebaut{background:#0f2417;color:#86efac}
  .pill.verworfen{background:#2a1416;color:#fca5a5}
  .pill.rueckstellmuster{background:#2a2440;color:#c4b5fd}
  .typbtns{display:flex;gap:8px}
  .typbtns button{flex:1;padding:14px 4px;border:2px solid var(--line);background:#0c0e12;
       color:var(--muted);border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
  .typbtns button.active{border-color:var(--accent);background:#16263f;color:#fff}
  .typbadge{display:inline-block;padding:3px 12px;border-radius:99px;font-size:14px;font-weight:800;
       background:#16263f;color:#93c5fd;border:1px solid var(--accent)}
  .typmissing{color:var(--err);font-weight:700}
</style>
</head>
<body>
<header>
  <h1>T.H.O.R. Hülsen-Scan</h1>
  <div class="stations">
    <button data-s="extrudieren" class="active">1 · Extrudieren</button>
    <button data-s="wiegen">2 · Wiegen</button>
    <button data-s="einbau">3 · Einbau</button>
  </div>
</header>

<main>
  <div class="scanbox">
    <div id="typrow" style="display:none;margin-bottom:14px">
      <label id="typlabel">Typ wählen (gilt für alle folgenden Scans)</label>
      <div class="typbtns">
        <button type="button" data-typ="1">Typ 1</button>
        <button type="button" data-typ="2">Typ 2</button>
        <button type="button" data-typ="3">Typ 3</button>
      </div>
    </div>

    <div id="einbau-start" style="display:none;margin-bottom:14px">
      <label>Erste Seriennummer dieser Charge</label>
      <div class="row" style="margin-top:0">
        <div style="flex:2">
          <input id="startserie" type="text" autocomplete="off" placeholder="z.B. L.1.26.0161">
        </div>
        <div style="flex:1">
          <button type="button" class="btn" id="startBtn" style="background:#1e293b;color:#fff;border:1px solid var(--accent)">Setzen</button>
        </div>
      </div>
      <div id="startstatus" class="muted" style="margin-top:6px"></div>
    </div>

    <label id="scanlabel">Hülse scannen – Station: Extrudieren</label>
    <input id="code" type="text" autocomplete="off" autocapitalize="off"
           autocorrect="off" spellcheck="false" inputmode="text"
           placeholder="Barcode scannen oder tippen…">

    <div id="wiegen-extra" style="display:none" class="row">
      <div>
        <label>Gewicht (g)</label>
        <input id="gewicht" type="number" step="0.1" inputmode="decimal" placeholder="z.B. 70.0">
      </div>
    </div>

    <button class="btn btn-ausschuss" id="ausschussBtn">⚠ Diese Hülse als Ausschuss buchen</button>

    <button class="btn" id="rsmBtn" style="display:none;background:#2a2440;color:#c4b5fd;border:1px solid #4c3f7a;margin-top:10px">⊘ Diese Hülse als Rückstellmuster/Test</button>

    <button class="btn" id="klebefehlerBtn" style="display:none;background:#3a2e22;color:#fbbf24;border:1px solid #5a4a2a;margin-top:10px">↩ Klebefehler – Rakete auflösen & nachrücken</button>
  </div>

  <div id="result" class="result"></div>
  <div id="blockinfo" class="blockinfo"></div>

  <div class="log">
    <h2>Letzte Scans (dieses Gerät)</h2>
    <div id="loglist"></div>
  </div>
</main>

<script>
// ====== KONFIGURATION ======
// Web-App-URL aus Apps Script (endet auf /exec)
const API_URL = 'https://script.google.com/macros/s/AKfycbwBTcuL0QwsH9mzxiLz1zc7Ghej4kiAK1g84hUW_WtFPJRRJxl9_Ctd3TMuSMhGL2Ju/exec';
// Muss mit dem Token im Apps Script übereinstimmen
const TOKEN   = 'HB-YOR';
// ===========================

let station = 'extrudieren';
const labels = { extrudieren:'Extrudieren', wiegen:'Wiegen', einbau:'Einbau' };
const codeEl = document.getElementById('code');
const resEl  = document.getElementById('result');
const blockEl= document.getElementById('blockinfo');
const logList= document.getElementById('loglist');
const recent = [];

// Aktiver Typ (Sitzungs-Zustand). Bleibt gesetzt, bis bewusst geändert.
// Wird im Browser gemerkt, damit er einen Reload übersteht.
let aktiverTyp = '';
try { aktiverTyp = localStorage.getItem('thor_typ') || ''; } catch(e){}

// Startnummer der Einbau-Charge (gemerkt wie der Typ)
let startSerie = '';
try { startSerie = localStorage.getItem('thor_startserie') || ''; } catch(e){}

const typrow = document.getElementById('typrow');
const typBtns = document.querySelectorAll('.typbtns button');

function setTyp(t){
  aktiverTyp = t;
  try { localStorage.setItem('thor_typ', t); } catch(e){}
  typBtns.forEach(b=> b.classList.toggle('active', b.dataset.typ===t));
  updateScanLabel();
}
typBtns.forEach(b=>{
  b.addEventListener('click', ()=>{ setTyp(b.dataset.typ); focusCode(); });
});
// gemerkten Typ beim Laden anzeigen
typBtns.forEach(b=> b.classList.toggle('active', b.dataset.typ===aktiverTyp));

function updateScanLabel(){
  const base = 'Hülse scannen – Station: '+labels[station];
  const lbl = document.getElementById('scanlabel');
  if(station==='extrudieren'){
    lbl.innerHTML = aktiverTyp
      ? base + ' · <span class="typbadge">Typ '+aktiverTyp+'</span>'
      : base + ' · <span class="typmissing">⚠ Typ wählen!</span>';
  } else {
    lbl.textContent = base;
  }
}

// Typ-Leiste pro Station ein-/ausblenden
function updateTypRow(){
  if(station==='extrudieren'){
    typrow.style.display='block';
    document.getElementById('typlabel').textContent = 'Typ wählen (gilt für alle folgenden Scans)';
    typBtns.forEach(b=>{ b.disabled=false; b.style.opacity='1'; });
  } else {
    typrow.style.display='none';
  }
  // Einbau-Elemente nur bei Einbau zeigen
  const istEinbau = (station==='einbau');
  document.getElementById('einbau-start').style.display = istEinbau ? 'block' : 'none';
  document.getElementById('rsmBtn').style.display = istEinbau ? 'block' : 'none';
  document.getElementById('klebefehlerBtn').style.display = istEinbau ? 'block' : 'none';
  // Ausschuss-Button-Text leicht anpassen je Station (optional)
  if(istEinbau){
    // gemerkte Startnummer ins Feld
    const sf = document.getElementById('startserie');
    if(sf && startSerie) sf.value = startSerie;
    updateStartStatus();
  }
}

function updateStartStatus(){
  const el = document.getElementById('startstatus');
  if(!el) return;
  if(startSerie){
    el.innerHTML = 'Aktive Startnummer: <span class="typbadge">'+startSerie+'</span>';
  } else {
    el.innerHTML = '<span class="typmissing">⚠ Noch keine Startnummer gesetzt</span>';
  }
}

// Station wechseln
document.querySelectorAll('.stations button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.stations button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    station = b.dataset.s;
    document.getElementById('scanlabel').textContent = 'Hülse scannen – Station: '+labels[station];
    document.getElementById('wiegen-extra').style.display = (station==='wiegen')?'flex':'none';
    updateTypRow();
    updateScanLabel();
    refreshBlockInfo();
    focusCode();
  });
});

function focusCode(){ codeEl.focus(); codeEl.select(); }

// Enter im Code-Feld = Scan absenden (HID-Scanner schickt Enter automatisch)
codeEl.addEventListener('keydown',e=>{
  if(e.key==='Enter'){ e.preventDefault(); sendScan(false); }
});
// Bei Wiegen: Enter im Gewichtsfeld löst ebenfalls aus
document.getElementById('gewicht').addEventListener('keydown',e=>{
  if(e.key==='Enter'){ e.preventDefault(); sendScan(false); }
});
document.getElementById('ausschussBtn').addEventListener('click',()=>{
  if(!codeEl.value.trim()){ showResult('err','Erst Hülse scannen, dann Ausschuss buchen.'); return; }
  if(confirm('Hülse '+codeEl.value.trim()+' wirklich als Ausschuss buchen?')) sendScan(true);
});

// Startnummer setzen (mit Kollisionsprüfung)
document.getElementById('startBtn').addEventListener('click', async ()=>{
  const val = document.getElementById('startserie').value.trim();
  if(!val){ showResult('err','Bitte eine Startnummer eingeben (z.B. L.1.26.0161).'); return; }
  showResult('warn','Prüfe Startnummer…');
  try{
    const d = await jsonp({token:TOKEN, action:'startInfo', startserie:val});
    if(!d.ok){ showResult('err','✗ '+(d.error||'Fehler')); return; }
    if(d.kollision){
      const ok = confirm('ACHTUNG: Für '+d.prefix+' sind bereits Nummern vergeben '
        +'(höchste: '+d.hoechsteVergeben+').\n\n'
        +'Wenn du bei '+d.startnummer+' startest, könnte es zu Doppelvergaben kommen.\n'
        +'Die nächste FREIE Nummer wäre '+d.naechsteFrei+'.\n\n'
        +'Trotzdem mit '+d.startnummer+' als Startnummer fortfahren?');
      if(!ok){ showResult('warn','Startnummer nicht gesetzt.'); return; }
    }
    startSerie = val;
    try { localStorage.setItem('thor_startserie', val); } catch(e){}
    updateStartStatus();
    showResult('ok','✓ Startnummer gesetzt: '+d.startnummer+' · nächste freie: '+d.naechsteFrei);
    focusCode();
  }catch(err){
    showResult('err','Netzwerkfehler: '+err.message);
  }
});

// Rückstellmuster/Test
document.getElementById('rsmBtn').addEventListener('click',()=>{
  if(!codeEl.value.trim()){ showResult('err','Erst Hülse scannen, dann als Rückstellmuster buchen.'); return; }
  if(confirm('Hülse '+codeEl.value.trim()+' als Rückstellmuster/Test buchen?\n(Bekommt keine Seriennummer, Zählung läuft lückenlos weiter.)')){
    sendScan(false, true);
  }
});

// Klebefehler – Rakete auflösen und nachrücken
document.getElementById('klebefehlerBtn').addEventListener('click', async ()=>{
  if(!startSerie){ showResult('err','Erst Startnummer setzen (für den Prefix).'); return; }
  const prefix = startSerie.substring(0, startSerie.lastIndexOf('.'));
  const num = prompt('Klebefehler – welche Raketennummer fällt raus?\n\n'
    +'Nur die laufende Nummer eingeben (z.B. 42 für '+prefix+'.0042):');
  if(num===null) return;
  const raketennum = parseInt(num.trim(),10);
  if(isNaN(raketennum)){ showResult('err','Ungültige Nummer.'); return; }
  showResult('warn','Hole Vorschau…');
  try{
    const v = await jsonp({token:TOKEN, action:'klebefehler', prefix:prefix, raketennum:String(raketennum), modus:'vorschau'});
    if(!v.ok){ showResult('err','✗ '+(v.error||'Fehler')); return; }
    let txt = 'Folgende Änderungen werden vorgenommen:\n\n';
    v.aenderungen.forEach(a=>{ txt += a.code+': '+a.von+' → '+a.nach+'\n'; });
    txt += '\nWirklich ausführen? (Die rausfallende Hülse wird Rückstellmuster.)';
    if(!confirm(txt)){ showResult('warn','Abgebrochen.'); return; }
    showResult('warn','Führe Nachrücken aus…');
    const a = await jsonp({token:TOKEN, action:'klebefehler', prefix:prefix, raketennum:String(raketennum), modus:'ausfuehren'});
    if(!a.ok){ showResult('err','✗ '+(a.error||'Fehler')); return; }
    showResult('ok','✓ Klebefehler aufgelöst – '+a.anzahl+' Einträge angepasst, Nummern wieder lückenlos.');
    refreshBlockInfo();
  }catch(err){
    showResult('err','Netzwerkfehler: '+err.message);
  }
});

// JSONP-Aufruf: umgeht CORS, indem die Anfrage als <script>-Tag geladen wird.
// Apps Script antwortet mit callback({...}), das wir hier auffangen.
let _jsonpCounter = 0;
function jsonp(params, timeoutMs){
  return new Promise((resolve, reject)=>{
    const cbName = '_thorcb_' + (++_jsonpCounter) + '_' + Date.now();
    const script = document.createElement('script');
    let done = false;
    const cleanup = ()=>{
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
    };
    const timer = setTimeout(()=>{
      if(done) return; done = true; cleanup();
      reject(new Error('Zeitüberschreitung – keine Antwort vom Server.'));
    }, timeoutMs || 20000);
    window[cbName] = (data)=>{
      if(done) return; done = true;
      clearTimeout(timer); cleanup(); resolve(data);
    };
    const usp = new URLSearchParams(params);
    usp.set('callback', cbName);
    script.onerror = ()=>{
      if(done) return; done = true;
      clearTimeout(timer); cleanup();
      reject(new Error('Netzwerkfehler beim Laden.'));
    };
    script.src = API_URL + '?' + usp.toString();
    document.body.appendChild(script);
  });
}

async function sendScan(istAusschuss, istRSM){
  const code = codeEl.value.trim();
  if(!code){ return; }
  // Beim Extrudieren MUSS ein Typ gewählt sein
  if(station==='extrudieren' && !istAusschuss && !istRSM && !aktiverTyp){
    showResult('err','⚠ Bitte zuerst einen Typ wählen (1, 2 oder 3), bevor du scannst.');
    codeEl.value=''; focusCode();
    return;
  }
  // Beim Einbau MUSS eine Startnummer gesetzt sein (außer bei Ausschuss/RSM)
  if(station==='einbau' && !istAusschuss && !istRSM && !startSerie){
    showResult('err','⚠ Bitte zuerst die Startnummer dieser Charge setzen.');
    codeEl.value=''; focusCode();
    return;
  }
  const params = {
    token: TOKEN, action:'scan', code, station,
    ausschuss: istAusschuss?'1':'0',
    rsm: istRSM?'1':'0'
  };
  if(station==='extrudieren' && aktiverTyp) params.typ = aktiverTyp;
  if(station==='einbau' && startSerie) params.startserie = startSerie;
  if(station==='wiegen'){
    const g = document.getElementById('gewicht').value.trim();
    if(g) params.gewicht = g;
  }
  showResult('warn','Sende…');
  try{
    const data = await jsonp(params);
    handleResponse(data, code);
  }catch(err){
    showResult('err','Netzwerkfehler: '+err.message+'  — Scan NICHT gespeichert.');
  }
}

function handleResponse(data, code){
  if(!data.ok){
    showResult('err','✗ '+(data.error||'Fehler'));
    return;
  }
  let html='';
  if(data.status==='verworfen'){
    html = '<div>Hülse <b>'+code+'</b></div><div class="big" style="color:var(--warn)">⚠ Ausschuss verbucht</div>';
    showResult('warn', html + warnLine(data));
  } else if(data.status==='rueckstellmuster'){
    html = '<div>Hülse <b>'+code+'</b></div><div class="big" style="color:#c4b5fd">⊘ Rückstellmuster/Test</div>'
         + '<div class="muted">Keine Seriennummer · Zählung läuft lückenlos weiter</div>';
    showResult('warn', html + warnLine(data));
  } else if(station==='einbau' && data.serienNr){
    html = '<div>Hülse <b>'+code+'</b> → Seriennummer</div>'
         + '<div class="serie">'+data.serienNr+'</div>';
    showResult('ok', html + warnLine(data));
  } else {
    let typInfo = '';
    if(station==='wiegen'){
      if(data.typ){
        typInfo = '<div style="margin-top:6px">Typ dieser Hülse: <span class="typbadge">Typ '+data.typ+'</span></div>';
      } else {
        typInfo = '<div class="typmissing" style="margin-top:6px">⚠ Kein Typ hinterlegt (Extrudier-Scan fehlt?)</div>';
      }
    } else if(data.typ){
      typInfo = '<div class="muted" style="margin-top:4px">Typ: <span class="typbadge">'+data.typ+'</span></div>';
    }
    html = '<div>Hülse <b>'+code+'</b></div>'
         + '<div class="big">✓ '+capitalize(data.status)+'</div>'
         + typInfo
         + (data.gewicht?('<div class="muted">Gewicht: '+data.gewicht+' g</div>'):'');
    showResult('ok', html + warnLine(data));
  }
  addRecent(code, data);
  // Felder leeren, bereit für nächsten Scan
  codeEl.value=''; 
  const g=document.getElementById('gewicht'); if(g) g.value='';
  refreshBlockInfo();
  focusCode();
}

function warnLine(d){
  return d.hinweis ? '<div class="muted" style="margin-top:8px">⚠ '+d.hinweis+'</div>' : '';
}

function showResult(kind,html){
  resEl.className='result show '+kind;
  resEl.innerHTML=html;
}

function addRecent(code,data){
  recent.unshift({code, status:data.status, serie:data.serienNr||'', t:new Date()});
  if(recent.length>15) recent.pop();
  logList.innerHTML = recent.map(x=>
    '<div class="logrow"><span class="code">'+x.code+'</span>'
    +'<span class="st">'+(x.serie?('→ '+x.serie+'  '):'')
    +'<span class="pill '+x.status+'">'+x.status+'</span></span></div>'
  ).join('');
}

async function refreshBlockInfo(){
  if(station!=='einbau' || !startSerie){ blockEl.textContent=''; return; }
  try{
    const d = await jsonp({token:TOKEN, action:'startInfo', startserie:startSerie});
    if(d.ok){
      blockEl.textContent = 'Nächste Seriennummer: '+d.naechsteFrei;
    } else {
      blockEl.textContent = d.error||'';
    }
  }catch(e){ blockEl.textContent=''; }
}

function capitalize(s){ return s? s.charAt(0).toUpperCase()+s.slice(1) : s; }

// Fokus halten: wenn man irgendwo hin tippt, zurück ins Scanfeld
document.addEventListener('click',e=>{
  if(e.target.tagName!=='INPUT' && e.target.tagName!=='BUTTON') focusCode();
});
window.addEventListener('load',()=>{ updateTypRow(); updateScanLabel(); refreshBlockInfo(); focusCode(); });
</script>
</body>
</html>
